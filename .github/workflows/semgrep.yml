name: Semgrep SAST
on:
    pull_request:
        branches:
            - main
    push:
        branches:
            - main
    workflow_dispatch:
jobs:
  semgrep:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Semgrep SAST
        uses: returntocorp/semgrep-action@v1
        with:
          config: p/php-security-audit