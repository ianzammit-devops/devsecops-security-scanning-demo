name: Gitleaks Scan
on:
    pull_request:
        branches:
            - main
    push:
        branches:
            - main
    workflow_dispatch:
jobs:
    scan:
        name: Run Gitleaks Scan
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
              with:
                fetch-depth: 0
                
            - name: Run Gitleaks Action
              uses: gitleaks/gitleaks-action@v2
              env:
                GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    